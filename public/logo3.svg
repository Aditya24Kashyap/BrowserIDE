<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 60 60" width="60" height="60">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4f46e5"/>
      <stop offset="100%" stop-color="#a855f7"/>
    </linearGradient>
    <clipPath id="clip">
      <rect width="60" height="60" rx="14"/>
    </clipPath>
  </defs>

  <!-- bg -->
  <rect width="60" height="60" rx="14" fill="url(#bg)"/>

  <!-- subtle top-left light sheen -->
  <ellipse cx="10" cy="8" rx="28" ry="18" fill="#ffffff" fill-opacity="0.12" clip-path="url(#clip)"/>

  <!-- > chevron -->
  <polyline points="10,22 22,30 10,38" fill="none" stroke="#ffffff" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- _ underscore/cursor -->
  <rect x="27" y="38" width="20" height="5" rx="2.5" fill="#ffffff"/>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 60 60" width="60" height="60">
  <rect width="60" height="60" rx="12" fill="#18181b"/>
  <!-- two colored dots top-left -->
  <circle cx="14" cy="14" r="4" fill="#ff4d6d"/>
  <circle cx="26" cy="14" r="4" fill="#a855f7"/>
  <!-- horizontal line separator -->
  <line x1="8" y1="24" x2="52" y2="24" stroke="#ffffff" stroke-opacity="0.15" stroke-width="1"/>
  <!-- > chevron -->
  <polyline points="12,33 24,42 12,51" fill="none" stroke="#ffffff" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- _ cursor -->
  <rect x="30" y="46" width="18" height="5" rx="2.5" fill="#ffffff"/>
</svg>
